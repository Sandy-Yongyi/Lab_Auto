# =============================================================================
# SprayConfig.toml 喷涂公共配置
# 策略编号：1=按帧，2=完整工件，3=连续双向。
# 本文件只保存全局规则和界面输入范围；每台设备的实际参数在 MachineConfig*.toml。
# =============================================================================


# =============================================================================
# 一、三种策略共用参数（策略 1 / 2 / 3）
# =============================================================================

# 喷涂伺服定位公差，单位 mm
spray_pos_tolerance = 30

# X 轴提前定位的安全距离，按帧和完整工件模式共用，单位 mm
x_pre_distance = 50

# 侧面二维往复计次轴："x" 或 "y"；选择 y 时，y_min -> y_max -> y_min 计一次往复
side_2d_cycle_axis = "x"

# X 轴出粉偏移的界面输入范围，单位 mm
x_status_offset_min = 0
x_status_offset_max = 300

# 外侧前 X 轴偏移的界面输入范围，单位 mm
out_front_x_offset_min = 0
out_front_x_offset_max = 300

# 外侧后 X 轴偏移的界面输入范围，单位 mm
out_after_x_offset_min = 0
out_after_x_offset_max = 300

# 外侧上方 Y 轴偏移的界面输入范围，单位 mm
out_up_y_offset_min = 0
out_up_y_offset_max = 300

# 外侧下方 Y 轴偏移的界面输入范围，单位 mm
out_down_y_offset_min = 0
out_down_y_offset_max = 300

# 外侧 Z 轴前定位偏移的界面输入范围，单位 mm
out_z_front_offset_min = 50
out_z_front_offset_max = 500

# 外侧 Z 轴后定位偏移的界面输入范围，单位 mm
out_z_after_offset_min = 50
out_z_after_offset_max = 500

# 外侧往复喷涂次数的界面输入范围
outside_total_cycles_min = 1
outside_total_cycles_max = 5


# =============================================================================
# 二、按帧与连续双向模式共用参数（策略 1 / 3）
# 连续双向模式的运动侧复用按帧状态机，因此共用以下判定和 X 轴计算配置。
# =============================================================================

# Z 窗口边界连续多少帧有数据时，判定工件开始或结束
stage_detect_frame_count = 8

# 按帧 X 轴计算模式：0=静态全局范围，1=动态逐枪插补
frame_x_interpolation_enabled = 1

# 设备开启且按帧状态空闲时：0=全部轴回安全位置，1=Y轴在配置范围内往复且X/Z回安全位置
frame_idle_y_reciprocate_enabled = 1


# =============================================================================
# 三、完整工件模式参数（策略 2）
# 以下参数供完整工件规划、分枪逻辑及保留的兼容运动逻辑使用。
# =============================================================================

# xn_side 设备的 Y 轴分枪模式：0=共享Y，1=独立Y；修改后重启软件生效
xn_side_y_mode = 1

# 每把喷枪 Y 轴方向的间距，用于分枪，单位 mm
gun_distance = 430

# 外翻转轴在 Y 轴底部往复时的最高运动位置，单位 mm
bottom_recip_y_max = 2000

# 柜体矩形喷涂分段阈值；默认分 4 段，大于该值时分 6 段
rect_threshold = 150

# 车厢内端面数据的 Y 突变高度，单位 mm
y_jump_threshold = 1000

# 车厢内端面数据的 X 扫描最大值，单位 mm
x_scan_max = 500

# 仿形运动模式：0=正常模式，1=二维模式
fx_mode = 1

# 侧面往复模式："2d"=二维模式，"rect"=矩形模式
side_reciprocate_mode = "2d"

# 侧面柜体是否喷涂背端面：1=喷涂，0=跳过中间 end_face 喷涂
side_back_end_face_enabled = 0

# 侧面是否旋转：1=旋转，0=所有侧面 R 轴角度归零
side_rotate_enabled = 1

# 云雀内分区的最小往复距离，单位 mm
min_recip_distance = 100

# 内侧前 X 轴偏移的界面输入范围，单位 mm
in_front_x_offset_min = -50
in_front_x_offset_max = 300

# 内侧后 X 轴偏移的界面输入范围，单位 mm
in_after_x_offset_min = 50
in_after_x_offset_max = 300

# 内侧上方 Y 轴偏移的界面输入范围，单位 mm
in_up_y_offset_min = 50
in_up_y_offset_max = 300

# 内侧下方 Y 轴偏移的界面输入范围，单位 mm
in_down_y_offset_min = 50
in_down_y_offset_max = 300

# 内侧 Z 轴前定位偏移的界面输入范围，单位 mm
in_z_front_offset_min = 50
in_z_front_offset_max = 500

# 内侧 Z 轴后定位偏移的界面输入范围，单位 mm
in_z_after_offset_min = 50
in_z_after_offset_max = 500

# Y 轴原点位置的界面输入范围，单位 mm
origin_pos_min = 2500
origin_pos_max = 4000

# 内侧往复喷涂次数的界面输入范围
inside_total_cycles_min = 1
inside_total_cycles_max = 5

# 往复减少距离的界面输入范围，单位 mm
recip_reduce_distance_min = 0
recip_reduce_distance_max = 300
