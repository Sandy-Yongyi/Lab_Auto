# =============================================================================
# ReadDataConfig.toml 点云采集与处理配置
# 策略编号：1=按帧，2=完整工件，3=连续双向。
# 公共参数放在文件顶部，模式专用参数按策略分区放在文件末尾。
# =============================================================================


# =============================================================================
# 一、三种策略共用参数（策略 1 / 2 / 3）
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 点云直通滤波范围，单位 mm
# -----------------------------------------------------------------------------

# 所有方向采用同一原点时的整体滤波范围
combined_x_min = 1150
combined_x_max = 2500
combined_y_min = 1100
combined_y_max = 3600

# 左侧激光滤波范围
left_x_min = 1150
left_x_max = 2500
left_y_min = 1100
left_y_max = 3600

# 右侧激光滤波范围
right_x_min = 1150
right_x_max = 2500
right_y_min = 1100
right_y_max = 3600

# 左上侧激光滤波范围
left_upper_x_min = -700
left_upper_x_max = 700
left_upper_y_min = 1100
left_upper_y_max = 3600

# 右上侧激光滤波范围
right_upper_x_min = -700
right_upper_x_max = 700
right_upper_y_min = 1100
right_upper_y_max = 3600

# 能量值过滤阈值，按百分比计算
energy_percentage = 0.9

# 激光点云有效半径阈值，单位 mm
radius_threshold = 100

# 有效半径范围内要求的最小点数
radius_num = 100


# -----------------------------------------------------------------------------
# 2. 点云分组间隔，单位 mm
# -----------------------------------------------------------------------------
x_threshold = 10                         # X 方向每 10 mm 分为一组
y_threshold = 10                         # Y 方向每 10 mm 分为一组
z_threshold = 10                         # Z 方向每 10 mm 分为一帧/一组


# -----------------------------------------------------------------------------
# 3. 扫描有效性
# -----------------------------------------------------------------------------
left_scan_points_threshold = 10          # 左侧少于该点数时不认为是有效数据
right_scan_points_threshold = 10         # 右侧少于该点数时不认为是有效数据
left_upper_scan_points_threshold = 10    # 左上侧少于该点数时不认为是有效数据
right_upper_scan_points_threshold = 10   # 右上侧少于该点数时不认为是有效数据
max_scan_length = 10000                  # 超过该扫描长度时自动结束当前工件，单位 mm


# -----------------------------------------------------------------------------
# 4. PLC、脉冲与 FIFO 基础参数
# -----------------------------------------------------------------------------
plc_send_max_retries = 1                 # PLC 数据发送最大重试次数
max_pulse = 160000                       # PLC 脉冲最大值，超过后重置为 0
pulse_to_mm = 12.4                       # 脉冲转毫米系数；六楼实验室参考 12.4，信高参考 7.0
fifo_unit_mm = 2                         # FIFO 每递增 1 对应的链条距离，单位 mm
diff_start_pulse = 1                     # 连续帧脉冲极差超过该值时，判定链条开始运动


# -----------------------------------------------------------------------------
# 5. 连接与运行保护
# -----------------------------------------------------------------------------
lidar_connect_max_retries = 10000        # 激光雷达最大重连次数
plc_connect_max_retries = 10000          # PLC 最大重连次数
raw_data_timeout_s = 10                  # 链条运动时超过该秒数未收到新激光帧，则停链保护


# -----------------------------------------------------------------------------
# 6. 数据坐标、绘制与线程
# -----------------------------------------------------------------------------
translate_data_origin = 2                # 1=各激光使用同一原点，2=各自使用独立原点
draw_type = 2                            # 1=点云，2=线框，3=点云+线框
threadpool_size = 3                      # 点云处理与保存线程池大小


# =============================================================================
# 二、按帧与完整工件共用参数（策略 1 / 2）
# =============================================================================
start_skip_mm = 20                       # 软件启动后该距离内检测到工件时，跳过当前工件，单位 mm


# =============================================================================
# 三、按帧模式专用参数（策略 1）
# =============================================================================
frame_by_frame_queue_size = 1500         # 按帧模式每个方向的帧队列长度
fifo_reverse_tolerance = 10              # FIFO 后退不超过该值时忽略，超过时按异常处理


# =============================================================================
# 四、完整工件模式专用参数（策略 2）
# =============================================================================
complete_workpiece_queue_size = 20       # 每个方向、每台设备保存的完整工件队列长度
workpiece_fifo_step_mm = 5               # fifo_frame_pos 按该距离量化递增并支持跳变累计，单位 mm
linked_stop_distance_mm = 100            # 两个方向扫描停止位置允许的距离差，单位 mm
workpiece_origin_side = "right"          # 完整工件坐标原点方向："left" 或 "right"
workpiece_origin_reference_x = 3950      # 右侧为原点时：x_new = 该基准值 - x_old，单位 mm


# =============================================================================
# 五、连续双向模式专用参数（策略 3）
# 未单独配置 continuous_bidirectional_queue_size 时，程序使用默认队列长度 1500。
# =============================================================================
swing_threshold = 3                      # 往复扫描开始和结束的边界余量，单位 mm
max_swing_pulse = 3000                   # 往复扫描的最大脉冲范围
